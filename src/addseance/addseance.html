<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление сеанса | ИдёмВКино</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="addseance.css">
    <script src="addseance.js" type="module" defer></script>
</head>

<body>
    <div class="page-bg"></div>

    <div class="dialog-wrapper">
        <div class="dialog">
            <div class="dialog__header">
                <h2 class="dialog__title">Добавление сеанса</h2>
                <button class="dialog__close" id="close-btn" title="Закрыть">✕</button>
            </div>

            <div class="dialog__body">
                <form class="dialog__form" id="add-seance-form">
                    <div class="dialog__field">
                        <label class="dialog__label" for="seance-hall">Название зала</label>
                        <select class="dialog__input" id="seance-hall" name="seanceHallid" required>
                            <option value="" disabled selected>Выберите зал</option>
                        </select>
                    </div>

                    <div class="dialog__field">
                        <label class="dialog__label" for="seance-film">Название фильма</label>
                        <select class="dialog__input" id="seance-film" name="seanceFilmid" required>
                            <option value="" disabled selected>Выберите фильм</option>
                        </select>
                    </div>

                    <div class="dialog__field">
                        <label class="dialog__label" for="seance-time">Время начала</label>
                        <input type="time" class="dialog__input" id="seance-time" name="seanceTime" required>
                    </div>

                    <div class="dialog__actions">
                        <button type="submit" class="dialog__btn dialog__btn-accent" id="submit-btn">
                            Добавить сеанс
                        </button>
                        <button type="button" class="dialog__btn dialog__btn-regular" id="cancel-btn">
                            Отменить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
