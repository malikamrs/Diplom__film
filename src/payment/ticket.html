<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Электронный билет</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="payment.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js" defer></script>
    <script src="ticket.js" type="module" defer></script>
</head>

<body>
    <header class="header">
        <a href="../index/index.html" class="logo">Идём<span>в</span>кино</a>
    </header>
    <main class="payment">
        <div class="payment__wrapper">
            <section class="ticket">
                <div class="ticket__header">
                    <h1 class="ticket__logo">Идём<span>в</span>кино</h1>
                </div>
                <div class="ticket__body">
                    <h2 class="ticket__title">Электронный билет</h2>
                    <div class="ticket__content">
                        <div class="ticket__details">
                            <p class="ticket__row">
                                На фильм:
                                <span class="ticket__movie-title" id="ticket-movie">Загрузка...</span>
                            </p>
                            <p class="ticket__row">
                                Места:
                                <span class="ticket__value" id="ticket-seats">--</span>
                            </p>
                            <p class="ticket__row">
                                В зале:
                                <span class="ticket__value" id="ticket-hall">--</span>
                            </p>
                            <p class="ticket__row">
                                Начало сеанса:
                                <span class="ticket__value" id="ticket-time">--:--</span>
                            </p>
                            <p class="ticket__notice ticket__notice--top">
                                Покажите QR‑код нашему контролёру для подтверждения бронирования.
                            </p>
                            <p class="ticket__notice ticket__notice--greeting">
                                Приятного просмотра!
                            </p>
                        </div>
                        <div class="ticket__qr">
                            <canvas id="ticket-qr-canvas" class="ticket__qr-canvas"></canvas>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
</body>

</html>
