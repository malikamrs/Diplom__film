<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Билет</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="payment.css">
    <script src="payment.js" type="module" defer></script>
</head>

<body>
    <header class="header">
        <a href="../index/index.html" class="logo">Идём<span>в</span>кино</a>
    </header>
    <main class="payment">
        <div class="payment__wrapper">
            <section class="ticket">
                <div class="ticket__body">
                    <div class="ticket__top">
                        <h2 class="ticket__title">Вы выбрали билеты:</h2>
                    </div>

                    <div class="ticket__divider"></div>

                    <div class="ticket__bottom">
                        <div class="ticket__details">
                            <p class="ticket__row">
                                На фильм:
                                <span class="ticket__movie-title" id="ticket-movie">Загрузка...</span>
                            </p>
                            <p class="ticket__row">
                                Места:
                                <span class="ticket__value" id="ticket-seats">--</span>
                            </p>
                            <p class="ticket__row">
                                В зале:
                                <span class="ticket__value" id="ticket-hall">--</span>
                            </p>
                            <p class="ticket__row">
                                Начало сеанса:
                                <span class="ticket__value" id="ticket-time">--:--</span>
                            </p>
                            <p class="ticket__row">
                                Стоимость:
                                <span class="ticket__value" id="ticket-price">0</span>
                                <span class="ticket__currency">рублей</span>
                            </p>
                        </div>

                        <div class="ticket__actions">
                            <button class="ticket__button" id="ticket-code-btn">
                                получить код бронирования
                            </button>
                        </div>
                        <p class="ticket__notice">
                            После оплаты билет будет доступен в этом окне, а также придёт вам на почту.
                            Покажите QR‑код нашему контролёру у входа в зал.
                        </p>
                        <p class="ticket__notice ticket__notice--greeting">
                            Приятного просмотра!
                        </p>
                    </div>
                </div>
            </section>
        </div>
    </main>
</body>

</html>
